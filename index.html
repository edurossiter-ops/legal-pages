<!DOCTYPE html>
<html lang="en">
<head>

  <title>HistoriasReaisApp – Turn ideas into TikTok videos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="HistoriasReaisApp is a public-facing creator tool that helps creators and small businesses turn simple ideas into ready-to-post TikTok videos, using the official TikTok connection." />
  <!-- Use your icon as favicon -->
  <link rel="icon" type="image/jpeg" href="Icon.jpg" />
  <style>
    :root {
      /* Core palette inspired by the icon: dark cave, bronze, gold, warm light */
      --bg-body: #0b0a0a;
      --bg-elevated: #151215;
      --bg-soft: #20181b;
      --accent-main: #c47a2c;
      --accent-main-soft: rgba(196,122,44,0.12);
      --accent-strong: #f4b75f;
      --border-subtle: rgba(148,120,90,0.35);
      --text-main: #f9fafb;
      --text-muted: #cbd5f5;
      --text-soft: #9ca3af;
      --glow-amber: rgba(244,183,95,0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      background: radial-gradient(circle at top, #1d1410 0, #050506 45%, #000 100%);
      line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(18px);
      background: radial-gradient(circle at top, rgba(33,24,19,0.96), rgba(6,5,5,0.94));
      border-bottom: 1px solid var(--border-subtle);
    }
    .nav {
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 18px;
    }
    .brand img {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 0 0 12px rgba(244,183,95,0.45);
    }
    .nav-links {
      display: flex;
      gap: 18px;
      font-size: 14px;
      color: var(--text-soft);
    }
